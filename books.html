<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Books - Raza Bookstore</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box;}
body {
    font-family:'Inter',sans-serif;
    background: linear-gradient(to bottom, #f0f5f1, #e8f0e8);
    color:#222;
}
header, footer {
    background:#1a1a2e;
    color:#fff;
    text-align:center;
    padding:40px 20px;
    position:relative;
}
header img {
    width:120px; height:120px;
    border-radius:50%;
    margin-bottom:15px;
    border:3px solid #ff6f61;
    transition:transform 0.3s;
}
header img:hover {transform:scale(1.1);}
header h1 {font-size:2.5em; margin-bottom:10px;}
header p {opacity:0.8; font-size:1.1em;}

/* Filter Buttons */
.filter-buttons {
    display:flex; justify-content:center; flex-wrap:wrap; gap:15px; margin:40px 0 20px 0;
}
.filter-buttons button {
    padding:10px 20px;
    border:none;
    border-radius:25px;
    background: #ff6f61;
    color:#fff;
    font-weight:600;
    cursor:pointer;
    transition:all 0.3s ease;
}
.filter-buttons button:hover {
    background:#ff3f2f;
    transform:scale(1.1);
    box-shadow:0 6px 12px rgba(0,0,0,0.2);
}

/* Book Grid */
.books-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:25px;
    max-width:1200px;
    margin:0 auto 50px auto;
}
.book-card {
    background: linear-gradient(145deg, #ffffff, #e8f0e8);
    border-radius:20px;
    padding:20px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    transition: transform 0.3s, box-shadow 0.3s;
    position:relative;
}
.book-card:hover {
    transform:translateY(-10px);
    box-shadow:0 15px 30px rgba(0,0,0,0.25);
}
.book-card img {
    width:100%;
    border-radius:15px;
    margin-bottom:15px;
    transition: transform 0.3s;
}
.book-card img:hover {transform:scale(1.05);}
.book-card h4 {margin-bottom:8px; font-size:1.2em;}
.book-card p.price {
    font-weight:700;
    color:#ff6f61;
    font-size:1.1em;
    margin-bottom:10px;
    transition: transform 0.2s, color 0.3s;
}
.book-card p.price:hover {
    transform:scale(1.1);
    color:#ff3f2f;
}
.book-card a {
    display:inline-block;
    padding:10px 20px;
    background:#1a1a2e;
    color:#fff;
    text-decoration:none;
    border-radius:15px;
    font-weight:600;
    transition:all 0.3s;
}
.book-card a:hover {
    background:#ff6f61;
    transform:scale(1.05);
    box-shadow:0 6px 12px rgba(0,0,0,0.2);
}
.cart-counter {
    display:block;
    margin-top:5px;
    font-size:0.9em;
    color:#333;
}

/* Navigation Buttons */
.nav-buttons {
    display:flex; justify-content:center; flex-wrap:wrap; gap:20px; margin-bottom:50px;
}
.nav-buttons a {
    text-decoration:none;
    padding:12px 30px;
    background:#ff6f61;
    color:#fff;
    border-radius:25px;
    font-weight:600;
    transition:all 0.3s;
}
.nav-buttons a:hover {
    background:#ff3f2f;
    transform:scale(1.1);
    box-shadow:0 8px 16px rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<header>
    <h1>Books</h1>
    <p>Explore our amazing collection 📚</p>
</header>

<main>

<!-- Filter Buttons -->
<div class="filter-buttons">
    <button onclick="filterCategory('all')">All</button>
    <button onclick="filterCategory('fiction')">Fiction</button>
    <button onclick="filterCategory('nonfiction')">Non-Fiction</button>
    <button onclick="filterCategory('education')">Education</button>
</div>

<!-- Book Grid -->
<div class="books-grid" id="booksGrid">
    <div class="book-card" data-category="fiction">
        <img src="great.png" alt="Book 1">
        <h4>The Great Adventure</h4>
        <p class="price">$14.99</p>
        <a href="#" onclick="addToCart(this)">Add to Cart</a>
        <span class="cart-counter">0 in cart</span>
    </div>
    <div class="book-card" data-category="education">
        <img src="css.png" alt="Book 2">
        <h4>Learning CSS</h4>
        <p class="price">$19.99</p>
        <a href="#" onclick="addToCart(this)">Add to Cart</a>
        <span class="cart-counter">0 in cart</span>
    </div>
    <div class="book-card" data-category="fiction">
        <img src="my.png" alt="Book 3">
        <h4>Mystery of the Night</h4>
        <p class="price">$9.99</p>
        <a href="#" onclick="addToCart(this)">Add to Cart</a>
        <span class="cart-counter">0 in cart</span>
    </div>
    <div class="book-card" data-category="nonfiction">
        <img src="sc.png" alt="Book 4">
        <h4>History of Science</h4>
        <p class="price">$24.99</p>
        <a href="#" onclick="addToCart(this)">Add to Cart</a>
        <span class="cart-counter">0 in cart</span>
    </div>
</div>

<div class="nav-buttons">
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="contact.html">Contact</a>
    <a href="location.html">Locations</a>
</div>

</main>

<script>
// Filter books by category
function filterCategory(category) {
    const books = document.querySelectorAll('.book-card');
    books.forEach(book => {
        if (category === 'all' || book.dataset.category === category) {
            book.style.display = 'block';
        } else {
            book.style.display = 'none';
        }
    });
}

// Add to cart counter
function addToCart(button) {
    const counter = button.nextElementSibling;
    let count = parseInt(counter.textContent);
    count += 1;
    counter.textContent = count + ' in cart';
}
</script>

</body>
</html>
