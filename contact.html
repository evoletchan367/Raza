<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Raza Bookstore</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box;}
body {font-family:'Inter',sans-serif; background:#f5f5f5; color:#222;}
header, footer {background:#1a1a2e; color:#fff; text-align:center; padding:40px 20px;}
header img {width:120px; height:120px; border-radius:50%; margin-bottom:15px;}
header h1 {font-size:2.5em; margin-bottom:10px;}
header p {opacity:0.8; font-size:1.1em;}

/* Main content */
main {max-width:1000px; margin:30px auto; padding:0 20px;}
.contact-card {background:#fff; padding:30px; border-radius:20px; box-shadow:0 6px 16px rgba(0,0,0,0.1); text-align:center; margin-bottom:30px; transition:transform 0.3s;}
.contact-card:hover {transform:translateY(-5px); box-shadow:0 10px 20px rgba(0,0,0,0.2);}
.contact-card h2 {margin-bottom:20px; font-size:2em; color:#1a1a2e;}
.contact-card p {font-size:1.1em; margin-bottom:15px; color:#555;}

/* Social links */
.social-links {display:flex; justify-content:center; flex-wrap:wrap; gap:20px; margin-top:20px;}
.social-links a {display:flex; align-items:center; justify-content:center; width:50px; height:50px; background:#1a1a2e; color:#fff; border-radius:50%; font-size:1.5em; text-decoration:none; transition:transform 0.2s, background 0.3s;}
.social-links a:hover {transform:scale(1.1); background:#ff6f61;}

/* Navigation buttons */
.nav-buttons {display:flex; justify-content:center; flex-wrap:wrap; gap:20px; margin-top:30px;}
.nav-buttons a {text-decoration:none; padding:12px 25px; background:#ff6f61; color:#fff; border-radius:15px; font-weight:600; transition:transform 0.2s, box-shadow 0.3s;}
.nav-buttons a:hover {transform:scale(1.05); box-shadow:0 8px 16px rgba(0,0,0,0.2);}
</style>
</head>
<body>

<header>
    <h1>Contact Us</h1>
    <p>We’d love to hear from you 📬</p>
</header>

<main>
    <div class="contact-card">
        <h2>Get in Touch</h2>
        <p>Phone: <strong>+1 234 567 890</strong></p>
        <p>Email: <strong>contact@razabookstore.com</strong></p>
        <p>Visit us at our locations or follow us on social media!</p>
        <div class="social-links">
            <a href="https://www.instagram.com" target="_blank">📸</a>
            <a href="https://www.facebook.com" target="_blank">📘</a>
            <a href="https://twitter.com" target="_blank">🐦</a>
        </div>
    </div>

    <div class="nav-buttons">
        <a href="index.html">Home</a>
        <a href="books.html">Books</a>
        <a href="about.html">About Us</a>
        <a href="locations.html">Locations</a>
    </div>
</main>

<footer>
    <p>© 2026 Raza Bookstore</p>
</footer>

</body>
</html>
